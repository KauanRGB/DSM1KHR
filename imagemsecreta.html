<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        .escondido {
            display: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <button id="btnToggle">Mostrar / Esconder Imagem</button>

    <img id="minhaImagem" class="escondido" src="https://image.api.playstation.com/vulcan/ap/rnd/202505/0213/852b7673fae69181d4cc80ddaee2e6010ccf74fd0d3a5e52.jpg?w=440" alt="Imagem Aleatória">

    <script>

        const botao = document.getElementById('btnToggle');
        const imagem = document.getElementById('minhaImagem');

        botao.addEventListener('click', () => {
            imagem.classList.toggle('escondido');
        });
    </script>

</body>
</html>
